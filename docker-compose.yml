version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: ticketshow-db
    restart: always
    environment:
      POSTGRES_DB: ticket_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketshow-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=Password123!
      - DB_NAME=ticket_booking
      - JWT_SECRET=prod_access_secret_key_rotation
      - JWT_REFRESH_SECRET=prod_refresh_secret_key_rotation
      - BCRYPT_SALT_ROUNDS=12
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketshow-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://127.0.0.1:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
